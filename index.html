<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="个人学习笔记分享 - 记录每一次成长，分享每一份知识">
  <title>光 · 学习空间</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>
<body>

  <!-- ====== 导航栏 ====== -->
  <nav class="navbar" id="navbar">
    <div class="nav-brand" id="navBrand">✨ 光</div>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <ul class="nav-links" id="navLinks">
      <li class="nav-link active" data-page="home">首页</li>
      <li class="nav-link" data-page="notes">学习笔记</li>
      <li class="nav-link" data-page="search">知识搜索</li>
    </ul>
  </nav>

  <!-- ====== 首页 ====== -->
  <main class="page active" id="page-home">

    <!-- Hero -->
    <section class="hero">
      <canvas class="hero-canvas" id="heroCanvas"></canvas>
      <div class="hero-content">
        <div class="hero-avatar">
          <div class="hero-avatar-placeholder">✨</div>
        </div>
        <h1 class="hero-title">
          你好，我是<span class="gradient-text">光</span>
        </h1>
        <p class="hero-subtitle">记录每一次学习，分享每一份知识</p>
        <div class="hero-tags">
          <span class="hero-tag">📐 工程力学</span>
          <span class="hero-tag">💧 流体力学</span>
          <span class="hero-tag">🤖 AI 探索</span>
          <span class="hero-tag">🐍 Python</span>
          <span class="hero-tag">🎨 3D 建模</span>
        </div>
        <button class="hero-cta" onclick="navigateTo('notes')">
          浏览我的笔记 <span class="arrow">→</span>
        </button>
      </div>
      <div class="scroll-indicator">
        <span>向下滚动</span>
        <span>↓</span>
      </div>
    </section>

    <!-- 统计 -->
    <section class="stats-section">
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-number" id="statArticles">0</div>
          <div class="stat-label">篇学习笔记</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="statTags">0</div>
          <div class="stat-label">个知识领域</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">∞</div>
          <div class="stat-label">探索的热情</div>
        </div>
      </div>
    </section>

    <!-- 最近学习 -->
    <section class="recent-section">
      <div class="section-header">
        <h2 class="section-title">最近学习</h2>
        <span class="section-link" onclick="navigateTo('notes')">
          查看全部 →
        </span>
      </div>
      <div class="articles-grid" id="recentArticles"></div>
    </section>

    <footer class="footer">
      <p>用 <span class="footer-heart">♥</span> 记录学习 · 光 · 学习空间 © 2026</p>
    </footer>
  </main>

  <!-- ====== 学习笔记页 ====== -->
  <main class="page" id="page-notes">
    <div class="notes-page">
      <div class="notes-header">
        <h1 class="notes-title">📒 学习笔记</h1>
        <p class="notes-desc">记录每一次成长的足迹</p>
      </div>

      <!-- 标签筛选 -->
      <div class="filter-bar" id="filterBar"></div>

      <!-- 文章列表 -->
      <div class="articles-grid" id="articlesGrid"></div>
    </div>

    <footer class="footer">
      <p>用 <span class="footer-heart">♥</span> 记录学习 · 光 · 学习空间 © 2026</p>
    </footer>
  </main>

  <!-- ====== 知识搜索页 ====== -->
  <main class="page" id="page-search">
    <div class="search-page">
      <div class="search-hero">
        <h1 class="search-hero-title">
          🔍 <span class="gradient-text">知识搜索</span>
        </h1>
        <p class="search-hero-desc">在这里搜索你想了解的知识</p>

        <!-- 搜索框 -->
        <div class="search-box">
          <input type="text" class="search-input" id="searchInput"
                 placeholder="输入关键词搜索..." autocomplete="off">
          <span class="search-icon">🔍</span>
          <button class="search-clear" id="searchClear">✕</button>
        </div>

        <!-- 热门标签 -->
        <div class="hot-tags">
          <div class="hot-tags-label">热门搜索</div>
          <div class="hot-tags-list" id="hotTagsList"></div>
        </div>
      </div>

      <!-- 搜索结果 -->
      <div class="search-results-count" id="searchResultsCount"></div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <footer class="footer">
      <p>用 <span class="footer-heart">♥</span> 记录学习 · 光 · 学习空间 © 2026</p>
    </footer>
  </main>

  <!-- ====== 文章详情弹窗 ====== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <button class="modal-close">✕</button>
      <div class="modal-date" id="modalDate"></div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
